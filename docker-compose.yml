services:
  # ── Base de datos relacional ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  # ── Base de datos de notificaciones ──────────────────────
  postgres-notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${NOTIFICATIONS_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD}
      POSTGRES_DB: ${NOTIFICATIONS_DB_NAME}
    volumes:
      - pg_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATIONS_DB_USER} -d ${NOTIFICATIONS_DB_NAME}"]
      interval: 5s
      retries: 5

  # ── Caché de estado ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Message broker ────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  # ── API pública (punto de entrada) ────────────────────────
  api-gateway:
    build: ./api-gateway
    env_file: ${ENV_FILE:-.env.dev}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Consumidor: persiste órdenes en Postgres ──────────────
  writer-service:
    build: ./writer-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Consumidor: descuenta inventario ──────────────────────
  inventory-service:
    build: ./inventory-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Consumidor: persiste y envía notificaciones ───────────
  notification-service:
    build: ./notification-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pg_data:
  pg_notifications_data:
