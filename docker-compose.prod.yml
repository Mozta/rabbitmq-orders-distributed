services:
  api-gateway:
    ports:
      - "80:8000"
    environment:
      LOG_LEVEL: WARNING
    restart: always

  writer-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  inventory-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  notification-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    restart: always

  postgres-notifications:
    restart: always

  postgres-auth:
    restart: always

  auth-service:
    restart: always
    environment:
      LOG_LEVEL: WARNING
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: always