name: CI                    #Nombre del workflow
on:
    push:
        branches: [ main ]    #Rama en la que se ejecutará el workflow
    pull_request:
        branches: [ main ]    #Rama en la que se ejecutará el workflow


jobs:
    build-and-test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            ENV_FILE: .env

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Prepare env file
              run: cp .env.example .env

            - name: Build all services
              run: docker compose --env-file .env build

            - name: Start services
              run: docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env up --build -d

            - name: Wait for services to be healthy
              run: |
                  echo "Esperando a que los servicios jalen..."
                  timeout 120 bash -c '
                      until docker compose ps --format json | python3 -c "
                      import sys, json
                      services = [json.loads(line) for line in sys.stdin]
                      unhealthy = [s[\"Name\"] for s in services if s.get(\"Health\") not in (\"healthy\", \"\")]
                      if unhealthy:
                          print(f\"Esperando: {unhealthy}\")
                          sys.exit(1)
                      print(\"Todos los servicios están saludables.\")
                      "; do
                          sleep 5
                      done
                  '

            - name: Run integration tests
              run: |
                  chmod +x ./scripts/test.sh
                  ./scripts/test.sh

            - name: Show logs on failure
              if: failure()
              run: docker compose --env-file .env logs --tail=100

            - name: Cleanup
              if: always()
              run: docker compose --env-file .env down -v